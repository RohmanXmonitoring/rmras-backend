version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rmras-postgres
    environment:
      POSTGRES_USER: rmras_user
      POSTGRES_PASSWORD: rmras_password
      POSTGRES_DB: rmras_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rmras-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmras_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rmras-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rmras-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rmras-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://rmras_user:rmras_password@postgres:5432/rmras_db
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rmras-network
    restart: unless-stopped
    volumes:
      - ./storage:/app/storage
    command: npm run start:pm2

  nginx:
    image: nginx:alpine
    container_name: rmras-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - rmras-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: rmras-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rmras.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - rmras-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  rmras-network:
    driver: bridge
